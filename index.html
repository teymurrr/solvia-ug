        <h2>Frequently Asked Questions</h2>
        <h3>How long does the Approbation process take in Germany?</h3>
        <p>The Approbation timeline varies: Germany takes 3–12 months depending on your country of origin, document readiness, and the federal state. Indian doctors typically need 6–12 months including FSP preparation. Argentine and Colombian doctors may complete faster with EU-aligned curricula.</p>
        <h3>What is the Kenntnisprüfung vs Gleichwertigkeitsprüfung?</h3>
        <p>The Kenntnisprüfung is a knowledge exam required when your medical degree isn't considered fully equivalent. The Gleichwertigkeitsprüfung (equivalency assessment) determines whether your qualifications match German standards. Most non-EU doctors take the Kenntnisprüfung.</p>
        <h3>What salary can I expect as a doctor in Germany?</h3>
        <p>Doctors in Germany earn €5,500–€12,000/month depending on specialty, experience, and hospital type. Assistenzarzt (resident) positions start around €5,500/month, while Fachärzte (specialists) earn €7,500–€12,000/month.</p>
        <h3>Do I need to speak German to work as a doctor?</h3>
        <p>Yes. You need B2-level German for the medical language exam (Fachsprachprüfung/FSP). Solvia offers specialized medical German courses to help you prepare.</p>
        <h3>Can I work in Germany while waiting for my Approbation?</h3>
        <p>Yes. You can apply for a Berufserlaubnis (temporary medical license) which allows you to work under supervision while your Approbation is being processed.</p>
