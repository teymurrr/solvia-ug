# GitHub Actions workflow — Sync static HTML to Cloudflare R2
#
# Copy this file to: .github/workflows/sync-r2.yml
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN  — API token with R2 read/write permissions
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
#
# The workflow triggers on every push to main (i.e., every Lovable deploy)
# and uploads all static HTML files to the R2 bucket.

name: Sync Static HTML to R2

on:
  push:
    branches: [main]
    paths:
      - 'public/blog/**'
      - 'public/about/**'
      - 'public/contact/**'
      - 'public/employers/**'
      - 'public/homologation/**'
      - 'public/learning/**'
      - 'public/vacancies/**'
      - 'public/visa-info/**'
      - 'public/brochure-en/**'
      - 'public/home/**'
      - 'public/sitemap.xml'
      - 'public/robots.txt'
      - 'public/llms.txt'
      - 'public/llms-full.txt'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload static files to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash cloudflare-worker/upload-to-r2.sh
