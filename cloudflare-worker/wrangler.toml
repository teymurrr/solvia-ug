name = "solvia-bot-router"
main = "worker.js"
compatibility_date = "2024-12-01"
workers_dev = false
preview_urls = false

routes = [
  { pattern = "thesolvia.com/*", zone_name = "thesolvia.com" },
  { pattern = "www.thesolvia.com/*", zone_name = "thesolvia.com" }
]

[[r2_buckets]]
binding = "STATIC_PAGES"
bucket_name = "solvia-static-pages"
